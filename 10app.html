<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC 10 - 花火点火ゲーム -</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background: #000; 
            color: white; 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .game-window {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px; 
            margin: 0 auto;
            background: #111;
            overflow: hidden;
        }

        .base-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('videos/image.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            align-items: center;
            padding: 60px 20px;
            z-index: 10; 
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4); 
        }

        .header-area {
            text-align: center;
            width: 100%;
        }

        .game-title {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0055, 0 0 30px #ff0055; 
        }

        .game-concept {
            font-size: 0.9rem;
            margin: 10px 0 0 0;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00f3ff; 
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.8);
        }

        .main-area {
            text-align: center;
        }

        #timer {
            font-size: 5.5rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 10px #fff, 0 0 20px #00f3ff, 0 0 30px #00f3ff;
            letter-spacing: 2px;
        }

        #message {
            font-size: 1.2rem;
            margin-top: 15px;
            text-shadow: 0 0 5px #000;
            opacity: 0.9;
        }

        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .collection-counter {
            font-size: 0.9rem;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            text-shadow: 0 0 5px #000;
            transition: all 0.3s ease;
        }

        /* コンプリートした時にちょっと光らせる演出用 */
        .collection-counter.complete {
            border-color: #ffff00;
            box-shadow: 0 0 10px #ffff00;
            color: #ffff00;
        }

        #video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5; 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="game-window" id="main-window">
        <div class="base-background" id="bg-img"></div>

        <video id="video-layer" playsinline></video>

        <div id="game-ui">
            <div class="header-area" id="header-ui">
                <h1 class="game-title">SYNC 10</h1>
                <p class="game-concept">10秒ピタリでドデカい花火を打ち上げろ！</p>
            </div>

            <div class="main-area">
                <div id="timer">0.00</div>
                <div id="message">タップして点火スタート</div>
            </div>

            <div class="footer-area" id="footer-ui">
                <!-- id="counter-text" を追加してJavaScriptから数字を書き換え可能に -->
                <div class="collection-counter" id="counter-text">目撃した花火: 0 / 4</div>
            </div>
        </div>
    </div>

    <audio id="bgm-audio" src="sounds/tick.mp3" loop></audio>

    <script>
        let tapCount = 0;
        let startTime;
        let timerInterval;
        let isPerfectDebug = false;
        
        // 【新設】目撃した花火のコレクションを管理する脳みそ（保存機能付き）
        let unlockedFireworks = JSON.parse(localStorage.getItem('sync10_collection')) || [];

        const timerElement = document.getElementById('timer');
        const messageElement = document.getElementById('message');
        const videoElement = document.getElementById('video-layer');
        const uiElement = document.getElementById('game-ui');
        const headerUi = document.getElementById('header-ui');
        const footerUi = document.getElementById('footer-ui');
        const bgmAudio = document.getElementById('bgm-audio');
        const mainWindow = document.getElementById('main-window');
        const counterText = document.getElementById('counter-text');

        // 起動時に現在のコレクション数を画面に表示
        updateCounterDisplay();

        uiElement.addEventListener('click', (e) => {
            if (isPerfectDebug) return;
            
            tapCount++;

            if (tapCount === 1) {
                startTime = Date.now();
                messageElement.innerText = "ジャストで止めろ！";
                headerUi.style.visibility = 'hidden';
                footerUi.style.visibility = 'hidden';
                
                bgmAudio.currentTime = 0;
                bgmAudio.play().catch(err => console.log("BGM再生制限回避:", err));

                timerInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    timerElement.innerText = elapsed.toFixed(2);
                }, 10);

            } else if (tapCount === 2) {
                clearInterval(timerInterval);
                bgmAudio.pause();
                
                const elapsed = (Date.now() - startTime) / 1000;
                runJudgment(elapsed);

            } else if (tapCount === 3) {
                resetGame();
            }
        });

        function runJudgment(scoreTime) {
            timerElement.innerText = scoreTime.toFixed(2);
            const diff = Math.abs(scoreTime - 10.0);
            
            let resultKey = "miss";
            let resultVideo = "miss.mp4";
            let neonColor = "#ff0055"; 
            
            if (diff <= 0.05 || isPerfectDebug) {
                resultKey = "perfect";
                resultVideo = "perfect.mp4";
                neonColor = "#ffff00"; 
            } else if (diff <= 0.5) {
                resultKey = "success";
                resultVideo = "saccess.mp4"; 
                neonColor = "#00ff66"; 
            } else if (diff <= 1.0) {
                resultKey = "near";
                resultVideo = "near.mp4"; 
                neonColor = "#ff9900"; 
            }

            // 【新設】出した花火をコレクションに登録（重複は自動でスルー）
            if (!unlockedFireworks.includes(resultKey)) {
                unlockedFireworks.push(resultKey);
                // ブラウザの記憶に保存
                localStorage.setItem('sync10_collection', JSON.stringify(unlockedFireworks));
            }
            updateCounterDisplay();

            timerElement.style.textShadow = `0 0 10px #fff, 0 0 20px ${neonColor}, 0 0 30px ${neonColor}`;

            videoElement.src = "videos/" + resultVideo;
            videoElement.style.display = 'block';
            videoElement.play().catch(err => console.log("動画再生エラー:", err));

            uiElement.style.visibility = 'hidden';

            if (resultVideo !== "perfect.mp4" && !isPerfectDebug) {
                setTimeout(() => {
                    uiElement.style.visibility = 'visible';
                    headerUi.style.visibility = 'visible';
                    footerUi.style.visibility = 'visible';
                    messageElement.innerText = "タップしてリセット";
                }, 2000);
            } else {
                videoElement.onended = () => {
                    resetGame();
                };
            }
        }

        // 【新設】カウンターの数値を更新する関数
        function updateCounterDisplay() {
            const count = unlockedFireworks.length;
            counterText.innerText = `目撃した花火: ${count} / 4`;
            
            // 4種類全部集めたら見た目をハデにする
            if (count === 4) {
                counterText.classList.add('complete');
                counterText.innerText = `🎆 花火マスターコンプ！ 4 / 4 🎆`;
            }
        }

        function resetGame() {
            tapCount = 0;
            isPerfectDebug = false;
            bgmAudio.pause();
            bgmAudio.currentTime = 0;
            videoElement.style.display = 'none';
            videoElement.pause();
            
            uiElement.style.visibility = 'visible';
            headerUi.style.visibility = 'visible';
            footerUi.style.visibility = 'visible';
            timerElement.innerText = "0.00";
            timerElement.style.textShadow = "0 0 10px #fff, 0 0 20px #00f3ff, 0 0 30px #00f3ff";
            messageElement.innerText = "タップして点火スタート";
        }

        // デバッグ機能（3点タップ / Pキー）
        mainWindow.addEventListener('touchstart', (e) => {
            if (e.touches.length >= 3) {
                e.preventDefault();
                triggerPerfectDebug();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P') {
                triggerPerfectDebug();
            }
        });

        function triggerPerfectDebug() {
            clearInterval(timerInterval);
            bgmAudio.pause();
            isPerfectDebug = true;
            tapCount = 2;
            runJudgment(10.00);
        }
    </script>
</body>
</html>

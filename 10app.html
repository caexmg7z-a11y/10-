<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYNC 10</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; text-align: center; color: white; font-family: sans-serif; }
        #game-ui { position: absolute; top: 50%; width: 100%; z-index: 10; }
        #video-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; display: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="game-ui" onclick="handleTap()">
        <h1 id="timer">0.00</h1>
        <p id="message">タップしてスタート</p>
    </div>

    <video id="video-layer" playsinline></video>

    <script>
        let tapCount = 0;
        let startTime;
        let timerInterval;

        function handleTap() {
            tapCount++;
            if (tapCount === 1) { // スタート
                startTime = Date.now();
                document.getElementById('message').innerText = "計測中...";
                timerInterval = setInterval(() => {
                    document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2);
                }, 10);
            } else if (tapCount === 2) { // ストップ
                clearInterval(timerInterval);
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(2);
                document.getElementById('message').innerText = "判定中...";
                
                // ここで動画を再生
                const video = document.getElementById('video-layer');
                video.src = "videos/saccess.mp4"; // 後で判定ロジックで切り替え
                video.style.display = 'block';
                video.play();
                
                // UIを隠す（2秒後）
                setTimeout(() => { document.getElementById('game-ui').style.display = 'none'; }, 0);
            } else if (tapCount === 3) { // リセット
                tapCount = 0;
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('video-layer').style.display = 'none';
                document.getElementById('timer').innerText = "0.00";
                document.getElementById('message').innerText = "タップしてスタート";
            }
        }
    </script>
</body>
</html>

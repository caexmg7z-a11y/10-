<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC 10</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; touch-action: none; height: 100vh; }
        .fullscreen { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        /* 動画は最初は隠し、タップ後に表示 */
        .v-layer { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        #ui { z-index: 10; color: #39ff14; font-size: 20vw; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div class="fullscreen">
        <video id="v-perfect" class="v-layer" src="videos/perfect.mp4" playsinline></video>
        <video id="v-success" class="v-layer" src="videos/success.mp4" playsinline></video>
        <div id="ui"><div id="timer">0.00</div></div>
    </div>

    <script>
        let startTime, isRunning = false, isUnlocked = false;
        const vPerfect = document.getElementById('v-perfect');
        const vSuccess = document.getElementById('v-success');
        const timerUI = document.getElementById('timer');

        // LINE環境での音の制限を解除する「儀式」
        function unlockAudio() {
            if (isUnlocked) return;
            const videos = [vPerfect, vSuccess];
            videos.forEach(v => {
                v.muted = true; v.play(); v.pause(); v.currentTime = 0; v.muted = false;
            });
            isUnlocked = true;
        }

        // 動作をすべて一箇所に絞る
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            unlockAudio();

            if (!isRunning) {
                // スタート
                isRunning = true;
                startTime = Date.now();
                requestAnimationFrame(function update() {
                    if (!isRunning) return;
                    timerUI.innerText = ((Date.now() - startTime) / 1000).toFixed(2);
                    requestAnimationFrame(update);
                });
            } else {
                // ストップ
                isRunning = false;
                const elapsed = (Date.now() - startTime) / 1000;
                
                // 判定：10.00に近いならPerfect、そうでなければSuccess
                if (Math.abs(elapsed - 10.00) < 0.1) {
                    vPerfect.style.display = 'block';
                    vPerfect.play();
                } else {
                    vSuccess.style.display = 'block';
                    vSuccess.play();
                }
            }
        }, { passive: false });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNC 10</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { background-color: #030508; color: white; font-family: 'Share Tech Mono', sans-serif; text-align: center; overflow: hidden; width: 100%; height: 100svh; touch-action: none; }
        .game-fullscreen-container { width: 100%; height: 100%; background: linear-gradient(rgba(3, 5, 8, 0.85), rgba(3, 5, 8, 0.75)), url('videos/image.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: none; object-fit: cover; }
        .bg-video.perfect-foreground { z-index: 30 !important; }
        .ui-content { position: relative; z-index: 15; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #timer { font-size: 22vw; font-weight: bold; color: #39ff14; margin-bottom: 15px; line-height: 1; font-variant-numeric: tabular-nums; }
        #message { font-size: 4vw; min-height: 55px; color: #ffffff; }
        .next-btn { position: absolute; bottom: 30px; padding: 10px 30px; border: 1px solid #00f2fe; color: #00f2fe; opacity: 0; transition: opacity 0.3s; z-index: 40; pointer-events: auto; }
        .next-btn.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="game-fullscreen-container" id="fullscreen-pad">
        <video id="v-perfect" class="bg-video" src="videos/perfect.mp4" playsinline webkit-playsinline></video>
        <video id="v-success" class="bg-video" src="videos/success.mp4" playsinline webkit-playsinline></video>
        <video id="v-near" class="bg-video" src="videos/near.mp4" playsinline webkit-playsinline></video>
        <video id="v-miss" class="bg-video" src="videos/miss.mp4" playsinline webkit-playsinline></video>

        <div class="ui-content" id="text-group">
            <div id="timer">0.00</div>
            <div id="message">TAP TO START</div>
        </div>
        <div id="next-btn" class="next-btn">RESTART</div>
    </div>

    <script>
        let startTime, frameId, isRunning = false;
        const timerElement = document.getElementById('timer');
        const messageElement = document.getElementById('message');
        const videos = {
            perfect: document.getElementById('v-perfect'),
            success: document.getElementById('v-success'),
            near: document.getElementById('v-near'),
            miss: document.getElementById('v-miss')
        };

        // プリロード改善: ブラウザにメモリを確保させる
        function preloadVideos() {
            Object.values(videos).forEach(v => { v.load(); });
        }

        // タイマー更新: requestAnimationFrameによる滑らかな描画
        function updateTimer() {
            if (!isRunning) return;
            const elapsed = (performance.now() - startTime) / 1000;
            if (elapsed < 5) timerElement.innerText = elapsed.toFixed(2);
            else timerElement.innerText = "??.??";
            frameId = requestAnimationFrame(updateTimer);
        }

        function startTimer() {
            isRunning = true;
            startTime = performance.now();
            messageElement.innerText = "IGNITION...";
            updateTimer();
        }

        function stopTimer() {
            isRunning = false;
            cancelAnimationFrame(frameId);
            const score = (performance.now() - startTime) / 1000;
            timerElement.innerText = score.toFixed(2);
            
            // 判定ロジック: 許容誤差 ±0.01s を採用
            let type = 'miss';
            const diff = Math.abs(score - 10.00);
            if (diff <= 0.01) type = 'perfect';
            else if (diff <= 0.20) type = 'success';
            else if (diff <= 0.50) type = 'near';
            
            playResult(type);
        }

        function playResult(type) {
            const v = videos[type];
            v.style.display = 'block';
            v.play(); // 動画＋音声を一気に再生
            document.getElementById('next-btn').classList.add('show');
            document.getElementById('text-group').style.opacity = "0.2";
        }

        function resetGame() {
            Object.values(videos).forEach(v => {
                v.pause();
                v.currentTime = 0;
                v.style.display = 'none';
            });
            document.getElementById('next-btn').classList.remove('show');
            document.getElementById('text-group').style.opacity = "1";
            timerElement.innerText = "0.00";
            messageElement.innerText = "READY";
        }

        document.getElementById('fullscreen-pad').addEventListener('click', () => {
            if (!isRunning && !document.getElementById('next-btn').classList.contains('show')) {
                preloadVideos();
                startTimer();
            } else if (isRunning) {
                stopTimer();
            }
        });
        document.getElementById('next-btn').addEventListener('click', (e) => { e.stopPropagation(); resetGame(); });
    </script>
</body>
</html>

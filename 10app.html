<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10アプリ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { background-color: #030508; color: white; font-family: 'Share Tech Mono', sans-serif; text-align: center; overflow: hidden; height: 100svh; touch-action: none; }
        .game-fullscreen-container { width: 100%; height: 100%; background: linear-gradient(rgba(3, 5, 8, 0.85), rgba(3, 5, 8, 0.75)), url('videos/image.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: none; object-fit: cover; }
        .ui-content { position: relative; z-index: 15; transition: opacity 0.5s ease; width: 100%; padding: 20px; pointer-events: none; }
        #timer { font-size: 22vw; font-weight: bold; color: #39ff14; text-shadow: 0 0 15px #39ff14; font-variant-numeric: tabular-nums; }
        #message { font-size: 4vw; margin-top: 10px; }
        .next-btn { display: none; position: absolute; bottom: 50px; z-index: 40; padding: 10px 20px; border: 1px solid #00f2fe; color: #00f2fe; }
        .next-btn.show { display: block; }
    </style>
</head>
<body>
    <div class="game-fullscreen-container" id="fullscreen-pad">
        <video id="v-perfect" class="bg-video" src="videos/perfect.mp4" playsinline></video>
        <video id="v-success" class="bg-video" src="videos/success.mp4" playsinline></video>
        <video id="v-near" class="bg-video" src="videos/near.mp4" playsinline></video>
        <video id="v-miss" class="bg-video" src="videos/miss.mp4" playsinline></video>
        <div class="ui-content" id="text-group">
            <div id="timer">0.00</div>
            <div id="message">READY TO IGNITE</div>
        </div>
        <div id="next-btn" class="next-btn">TAP TO RESTART</div>
    </div>

    <script>
        let startTime, timerInterval, isRunning = false;
        const timerElement = document.getElementById('timer');
        const textGroup = document.getElementById('text-group');
        const nextBtn = document.getElementById('next-btn');
        const videos = { perfect: document.getElementById('v-perfect'), success: document.getElementById('v-success'), near: document.getElementById('v-near'), miss: document.getElementById('v-miss') };

        window.addEventListener('touchstart', (e) => {
            // 3点タップでPERFECT（裏技）
            if (e.touches.length >= 3) { if(isRunning) stopGame(true); return; }
            
            if (isRunning) { stopGame(false); }
            else { startGame(); }
        }, { passive: false });

        function startGame() {
            isRunning = true;
            startTime = Date.now();
            textGroup.style.opacity = "1";
            timerInterval = setInterval(() => {
                timerElement.innerText = ((Date.now() - startTime) / 1000).toFixed(2);
            }, 10);
        }

        function stopGame(forcePerfect) {
            isRunning = false;
            clearInterval(timerInterval);
            textGroup.style.opacity = "0"; // 演出中は数字を消す
            
            let time = forcePerfect ? 10.00 : parseFloat(timerElement.innerText);
            let type = (time === 10.00) ? 'perfect' : (time >= 9.9 && time <= 10.1) ? 'success' : (time >= 9.7 && time <= 10.3) ? 'near' : 'miss';
            
            const v = videos[type];
            v.style.display = 'block';
            v.play();
            
            setTimeout(() => { nextBtn.classList.add('show'); }, 3000);
        }

        nextBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            nextBtn.classList.remove('show');
            timerElement.innerText = "0.00";
            textGroup.style.opacity = "1";
            Object.values(videos).forEach(v => { v.style.display = 'none'; v.pause(); v.currentTime = 0; });
        });
    </script>
</body>
</html>

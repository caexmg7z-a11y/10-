<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC 10</title>
    <style>
        body { background: #030508; color: white; font-family: sans-serif; text-align: center; overflow: hidden; height: 100svh; touch-action: none; }
        .bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: none; object-fit: cover; }
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #timer { font-size: 20vw; font-weight: bold; color: #39ff14; }
        #status { font-size: 3vw; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <video id="v-perfect" class="bg-video" src="videos/perfect.mp4" playsinline></video>
    <video id="v-success" class="bg-video" src="videos/success.mp4" playsinline></video>
    <video id="v-near" class="bg-video" src="videos/near.mp4" playsinline></video>
    <video id="v-miss" class="bg-video" src="videos/miss.mp4" playsinline></video>

    <div id="ui">
        <div id="timer">0.00</div>
        <div id="status">演出 0/4 | TAP ANYWHERE</div>
    </div>

    <script>
        let startTime, frameId, isRunning = false, unlocked = false;
        let seen = new Set();
        const tickBgm = new Audio('sounds/tick.mp3');
        tickBgm.loop = true;
        const videos = { perfect: document.getElementById('v-perfect'), success: document.getElementById('v-success'), near: document.getElementById('v-near'), miss: document.getElementById('v-miss') };

        // どこをタップしても反応するように window で制御
        window.addEventListener('touchstart', (e) => {
            // 3本指タップを判定
            if (e.touches.length >= 3) {
                console.log("Debug: Force Perfect");
                stop(true);
                return;
            }

            // 通常タップ処理
            if (!unlocked) {
                Object.values(videos).forEach(v => { v.muted = true; v.play(); v.pause(); v.currentTime = 0; v.muted = false; });
                tickBgm.play(); tickBgm.pause(); tickBgm.currentTime = 0;
                unlocked = true;
                return;
            }

            if (!isRunning) {
                isRunning = true;
                startTime = performance.now();
                tickBgm.play();
                requestAnimationFrame(update);
            } else {
                isRunning = false;
                tickBgm.pause();
                tickBgm.currentTime = 0;
                stop(false);
            }
        }, { passive: false });

        function update() {
            if (!isRunning) return;
            document.getElementById('timer').innerText = ((performance.now() - startTime) / 1000).toFixed(2);
            frameId = requestAnimationFrame(update);
        }

        function stop(forcePerfect) {
            cancelAnimationFrame(frameId);
            const score = forcePerfect ? 10.00 : parseFloat(document.getElementById('timer').innerText);
            
            let type = 'miss';
            if (Math.abs(score - 10.00) <= 0.01) type = 'perfect';
            else if (Math.abs(score - 10.00) <= 0.20) type = 'success';
            else if (Math.abs(score - 10.00) <= 0.50) type = 'near';
            
            seen.add(type);
            document.getElementById('status').innerText = `演出 ${seen.size}/4 | ${type.toUpperCase()}`;
            
            const v = videos[type];
            v.style.display = 'block';
            v.play();
            setTimeout(() => { v.style.display = 'none'; v.currentTime = 0; }, 4000);
        }
    </script>
</body>
</html>
